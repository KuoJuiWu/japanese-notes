site_name: My Japanese Notes
site_url: https://kuojuiwu.github.io/japanese-notes/

theme:
  name: material
  language: ja
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
    - search.highlight
    - search.suggest

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Vocabulary Notes:
    - notes/index.md
    - 🎵 Song: notes/song/index.md
    - 🎌 Anime: notes/anime/index.md
    - 📚 Textbook: notes/textbook/index.md
    - 💬 Daily: notes/daily/index.md
    - 📦 Other: notes/other/index.md
  - Grammar Reference:
    - grammar/index.md
    - N5: grammar/N5/index.md
    - N4: grammar/N4/index.md
    - N3: grammar/N3/index.md
    - N2: grammar/N2/index.md
    - N1: grammar/N1/index.md